<section class="triggers">
  <div class="triggers__header">
    <h1 class="triggers__title">Triggers</h1>
    <button
      type="button"
      class="btn btn--primary"
      (click)="onAddTriggerClick()"
      aria-label="Add new trigger"
    >
      + Add Trigger
    </button>
  </div>

  @if (isLoading() && triggers().length === 0) {
    <p class="triggers__loading" aria-live="polite">Loading triggers…</p>
  }

  @if (!isLoading() && triggers().length === 0) {
    <p class="triggers__empty">No triggers yet. Add one to get started.</p>
  }

  <ul class="trigger-list" role="list">
    @for (trigger of triggers(); track trigger.id) {
      <li class="trigger-card">
        <div class="trigger-card__header">
          <span class="trigger-card__phrase" aria-label="Trigger phrase">{{ trigger.phrase }}</span>
          <span class="trigger-card__action-type" aria-label="Action type">{{ trigger.actionType }}</span>
          <div class="trigger-card__controls">
            <button
              type="button"
              class="btn btn--secondary btn--sm"
              (click)="onEditTriggerClick(trigger)"
              [attr.aria-label]="'Edit trigger: ' + trigger.phrase"
            >
              Edit
            </button>
            <button
              type="button"
              class="btn btn--danger btn--sm"
              (click)="onDeleteTrigger(trigger.id)"
              [attr.aria-label]="'Delete trigger: ' + trigger.phrase"
            >
              Delete
            </button>
          </div>
        </div>
      </li>
    }
  </ul>

  <app-modal
    [isVisible]="showCreateModal()"
    title="New Trigger"
    (closed)="onTriggerFormCancelled()"
  >
    <app-trigger-form
      [actions]="availableActions()"
      [isLoading]="isLoading()"
      (saved)="onTriggerSaved($event)"
      (cancelled)="onTriggerFormCancelled()"
    />
  </app-modal>

  <app-modal
    [isVisible]="showEditModal()"
    title="Edit Trigger"
    (closed)="onTriggerEditCancelled()"
  >
    <app-trigger-form
      [editTrigger]="selectedTrigger()"
      [actions]="availableActions()"
      [isLoading]="isLoading()"
      (saved)="onTriggerEditSaved($event)"
      (cancelled)="onTriggerEditCancelled()"
    />
  </app-modal>

  <app-confirmation-dialog
    [isVisible]="pendingDeleteId() !== null"
    message="Are you sure you want to delete this trigger?"
    confirmLabel="Yes, delete"
    cancelLabel="Cancel"
    (confirmed)="onDeleteConfirmed(pendingDeleteId()!)"
    (cancelled)="onDeleteCancelled()"
  />
</section>
