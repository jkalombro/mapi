@if (isLoading()) {
  <div class="item-list__loading" aria-label="Loading items" aria-busy="true">
    @for (_ of [1, 2, 3]; track $index) {
      <div class="item-list__skeleton"></div>
    }
  </div>
} @else if (items().length === 0) {
  <div class="item-list__empty">
    <p>No items yet. Add your first item to get started.</p>
  </div>
} @else {
  <div class="item-list" role="list" aria-label="Item list">
    <div class="item-list__header" role="row" aria-hidden="true">
      <span class="item-list__col item-list__col--name">Item Name</span>
      <span class="item-list__col item-list__col--bisaya">Bisaya Name</span>
      <span class="item-list__col item-list__col--price">Price</span>
      <span class="item-list__col item-list__col--actions">Actions</span>
    </div>
    @for (item of items(); track item.id) {
      <div class="item-list__row" role="listitem">
        <span class="item-list__col item-list__col--name">{{ item.itemName }}</span>
        <span class="item-list__col item-list__col--bisaya">{{ item.bisayaName }}</span>
        <span class="item-list__col item-list__col--price">₱{{ item.price }}</span>
        <span class="item-list__col item-list__col--actions">
          <button
            type="button"
            class="item-list__btn item-list__btn--edit"
            [attr.aria-label]="'Edit ' + item.itemName"
            (click)="onEdit(item)"
          >
            Edit
          </button>
          <button
            type="button"
            class="item-list__btn item-list__btn--delete"
            [attr.aria-label]="'Delete ' + item.itemName"
            (click)="onDelete(item.id)"
          >
            Delete
          </button>
        </span>
      </div>
    }
  </div>
}
