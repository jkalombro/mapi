@if (isVisible()) {
  <div class="dialog-backdrop" (click)="onCancel()">
    <div
      class="dialog"
      role="dialog"
      aria-modal="true"
      aria-labelledby="dialog-message"
      (click)="$event.stopPropagation()"
    >
      <p id="dialog-message" class="dialog__message">{{ message() }}</p>
      <div class="dialog__actions">
        <button
          type="button"
          class="dialog__btn dialog__btn--cancel"
          (click)="onCancel()"
        >
          {{ cancelLabel() }}
        </button>
        <button
          type="button"
          class="dialog__btn dialog__btn--confirm"
          (click)="onConfirm()"
        >
          {{ confirmLabel() }}
        </button>
      </div>
    </div>
  </div>
}
